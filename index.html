<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YYTI 压抑指数测试</title>
  <style>
    :root {
      --primary: #6c8d71;
      --primary-dark: #4d6a53;
      --primary-light: #8dab98;
      --bg-gradient: linear-gradient(135deg, #f5f7f5 0%, #e8ede8 100%);
      --card-bg: #ffffff;
      --text-primary: #2d3a2e;
      --text-secondary: #5a6b5c;
      --text-light: #8a9a8c;
      --border-color: #d4ddd5;
      --radius: 22px;
      --radius-sm: 12px;
      --shadow: 0 8px 32px rgba(108, 141, 113, 0.12);
      --shadow-sm: 0 4px 16px rgba(108, 141, 113, 0.08);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg-gradient);
      min-height: 100vh;
      color: var(--text-primary);
      line-height: 1.6;
    }

    .container {
      max-width: 680px;
      margin: 0 auto;
      padding: 20px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Screens */
    .screen {
      display: none;
      flex: 1;
      flex-direction: column;
      justify-content: center;
      animation: fadeIn 0.4s ease;
    }

    .screen.active {
      display: flex;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }

    /* Intro Screen */
    .intro-card {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 48px 40px;
      box-shadow: var(--shadow);
      text-align: center;
      animation: slideUp 0.6s ease;
    }

    .intro-icon {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      border-radius: 50%;
      margin: 0 auto 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      animation: float 3s ease-in-out infinite;
    }

    .intro-title {
      font-size: 28px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 12px;
      background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .intro-subtitle {
      font-size: 16px;
      color: var(--text-secondary);
      margin-bottom: 32px;
      line-height: 1.8;
    }

    .intro-features {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-bottom: 32px;
      flex-wrap: wrap;
    }

    .intro-feature {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
      color: var(--text-secondary);
      padding: 8px 16px;
      background: #f8faf8;
      border-radius: 20px;
      transition: all 0.3s ease;
    }

    .intro-feature:hover {
      background: rgba(108, 141, 113, 0.1);
      transform: translateY(-2px);
    }

    .intro-feature::before {
      content: "";
      width: 6px;
      height: 6px;
      background: var(--primary);
      border-radius: 50%;
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 32px;
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: white;
      box-shadow: 0 4px 16px rgba(108, 141, 113, 0.3);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(108, 141, 113, 0.4);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-secondary {
      background: var(--card-bg);
      color: var(--primary);
      border: 2px solid var(--primary);
    }

    .btn-secondary:hover {
      background: var(--primary);
      color: white;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none !important;
    }

    /* Test Screen */
    .test-header {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 20px 24px;
      margin-bottom: 20px;
      box-shadow: var(--shadow-sm);
    }

    .progress-container {
      margin-bottom: 12px;
    }

    .progress-bar {
      height: 8px;
      background: var(--border-color);
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary) 0%, var(--primary-light) 100%);
      border-radius: 4px;
      transition: width 0.4s ease;
    }

    .progress-text {
      font-size: 14px;
      color: var(--text-secondary);
      text-align: center;
      margin-top: 8px;
    }

    .test-card {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 32px;
      box-shadow: var(--shadow);
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .question-number {
      font-size: 13px;
      color: var(--primary);
      font-weight: 600;
      margin-bottom: 8px;
    }

    .question-text {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 28px;
      line-height: 1.7;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 12px;
      flex: 1;
    }

    .option {
      padding: 16px 20px;
      background: #f8faf8;
      border: 2px solid var(--border-color);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.25s ease;
      font-size: 15px;
      color: var(--text-primary);
      text-align: left;
    }

    .option:hover {
      border-color: var(--primary);
      background: #f0f5f0;
    }

    .option.selected {
      border-color: var(--primary);
      background: linear-gradient(135deg, rgba(108, 141, 113, 0.1) 0%, rgba(108, 141, 113, 0.05) 100%);
    }

    .option-marker {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: var(--border-color);
      color: var(--text-secondary);
      font-size: 13px;
      font-weight: 600;
      margin-right: 12px;
      transition: all 0.25s ease;
    }

    .option.selected .option-marker {
      background: var(--primary);
      color: white;
    }

    .test-footer {
      margin-top: 24px;
      display: flex;
      justify-content: center;
    }

    /* Result Screen */
    .result-card {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 32px;
      box-shadow: var(--shadow);
      text-align: center;
      margin-bottom: 20px;
    }

    .result-type-badge {
      display: inline-block;
      padding: 6px 16px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: white;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 16px;
    }

    .result-type-name {
      font-size: 32px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .result-match {
      font-size: 48px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 4px;
    }

    .result-match-label {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 24px;
    }

    .result-intro {
      font-size: 16px;
      color: var(--text-secondary);
      line-height: 1.8;
      padding: 20px;
      background: #f8faf8;
      border-radius: var(--radius-sm);
      margin-bottom: 16px;
    }

    .result-desc {
      font-size: 15px;
      color: var(--text-light);
      line-height: 1.7;
    }

    /* Dimensions Table */
    .dimensions-card {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: var(--shadow);
      margin-bottom: 20px;
    }

    .dimensions-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 16px;
      text-align: center;
    }

    .dimensions-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    .dimensions-table th {
      background: #f5f7f5;
      padding: 10px 8px;
      text-align: left;
      font-weight: 600;
      color: var(--text-secondary);
      border-bottom: 2px solid var(--border-color);
    }

    .dimensions-table th:first-child {
      border-radius: 8px 0 0 0;
    }

    .dimensions-table th:last-child {
      border-radius: 0 8px 0 0;
    }

    .dimensions-table td {
      padding: 10px 8px;
      border-bottom: 1px solid var(--border-color);
      color: var(--text-primary);
    }

    .dimensions-table tr:last-child td {
      border-bottom: none;
    }

    .dimension-level {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
    }

    .level-H {
      background: rgba(108, 141, 113, 0.15);
      color: var(--primary-dark);
    }

    .level-M {
      background: rgba(180, 160, 100, 0.15);
      color: #8a7a50;
    }

    .level-L {
      background: rgba(180, 100, 100, 0.15);
      color: #8a5050;
    }

    .result-footer {
      display: flex;
      gap: 12px;
      justify-content: center;
    }

    /* Pattern Display */
    .pattern-display {
      background: #f5f7f5;
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      margin-top: 16px;
      font-family: "SF Mono", "Consolas", monospace;
      font-size: 12px;
      color: var(--text-secondary);
      letter-spacing: 1px;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .container {
        padding: 16px;
      }

      .intro-card {
        padding: 32px 24px;
      }

      .intro-title {
        font-size: 24px;
      }

      .intro-subtitle {
        font-size: 15px;
      }

      .intro-features {
        flex-direction: column;
        gap: 12px;
      }

      .test-card {
        padding: 24px;
      }

      .question-text {
        font-size: 16px;
      }

      .result-type-name {
        font-size: 26px;
      }

      .result-match {
        font-size: 40px;
      }

      .dimensions-card {
        padding: 16px;
      }

      .dimensions-table {
        font-size: 12px;
      }

      .dimensions-table th,
      .dimensions-table td {
        padding: 8px 6px;
      }
    }

    /* Recommendation Section */
    .recommendation-section {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 16px;
      animation: slideUp 0.6s ease;
    }

    .rec-column {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow-sm);
    }

    .rec-column-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--primary-dark);
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 2px solid var(--border-color);
    }

    .rec-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .rec-item {
      position: relative;
      padding: 10px;
      padding-right: 50px;
      background: var(--bg-gradient);
      border-radius: var(--radius-sm);
    }

    .chat-btn {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      width: 32px;
      height: 32px;
      border: none;
      border-radius: 50%;
      background: var(--primary-light);
      color: white;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .chat-btn:hover {
      background: var(--primary);
      transform: translateY(-50%) scale(1.1);
    }

    .rec-book, .rec-tool {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 4px;
    }

    .rec-reason, .rec-desc {
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    /* Mobile responsive */
    @media (max-width: 480px) {
      .recommendation-section {
        grid-template-columns: 1fr;
      }
    }

    /* Footer */
    .footer {
      text-align: center;
      padding: 20px;
      color: var(--text-light);
      font-size: 12px;
    }

    /* 指引按钮 */
    .guidance-btn {
      display: block;
      width: 100%;
      padding: 16px 24px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: white;
      border: none;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 20px;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .guidance-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(108, 141, 113, 0.3);
    }

    /* 指引页面 */
    .guidance-screen {
      display: none;
      padding: 30px 20px;
      animation: fadeIn 0.4s ease;
    }
    .guidance-screen.active {
      display: block;
    }

    /* 三栏网格 */
    .guidance-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }

    /* 指引图标 */
    .guidance-icon {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 24px 16px;
      text-align: center;
      cursor: pointer;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s;
      box-shadow: var(--shadow-sm);
    }
    .guidance-icon:hover {
      transform: scale(1.15);
      box-shadow: 0 8px 32px rgba(108, 141, 113, 0.2);
    }
    .guidance-icon .icon-emoji {
      font-size: 48px;
      display: block;
      margin-bottom: 8px;
    }
    .guidance-icon .icon-label {
      font-size: 14px;
      color: var(--text-secondary);
      font-weight: 500;
    }

    /* 指引内容面板 */
    .guidance-content {
      display: none;
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 24px;
      margin-top: 16px;
      box-shadow: var(--shadow);
      animation: slideUp 0.3s ease;
    }
    .guidance-content.active {
      display: block;
    }
    .guidance-content h3 {
      font-size: 18px;
      color: var(--primary-dark);
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 2px solid var(--border-color);
    }
    .guidance-content .rec-item {
      background: var(--bg-gradient);
      border-radius: var(--radius-sm);
      padding: 16px;
      margin-bottom: 12px;
    }
    .guidance-content .rec-item:last-child {
      margin-bottom: 0;
    }

    /* Chat Overlay */
    .chat-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.2s ease;
    }
    .chat-overlay.active {
      display: flex;
    }

    .chat-window {
      width: 90%;
      max-width: 500px;
      height: 80vh;
      max-height: 700px;
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      animation: slideUp 0.3s ease;
    }

    .chat-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border-color);
      background: var(--card-bg);
    }

    .chat-back-btn {
      background: none;
      border: none;
      color: var(--text-secondary);
      font-size: 14px;
      cursor: pointer;
      padding: 4px 8px;
    }

    .chat-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .chat-clear-btn {
      background: none;
      border: none;
      color: var(--text-light);
      font-size: 12px;
      cursor: pointer;
      padding: 4px 8px;
    }

    .chat-identity {
      padding: 16px 20px;
      background: var(--bg-gradient);
      border-bottom: 1px solid var(--border-color);
    }

    .chat-identity-name {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 4px;
    }

    .chat-identity-desc {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .chat-message {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: var(--radius-sm);
      line-height: 1.5;
      font-size: 14px;
    }

    .chat-message.ai {
      align-self: flex-start;
      background: var(--bg-gradient);
      color: var(--text-primary);
      border-bottom-left-radius: 4px;
    }

    .chat-message.user {
      align-self: flex-end;
      background: var(--primary);
      color: white;
      border-bottom-right-radius: 4px;
    }

    .chat-message.error {
      align-self: flex-start;
      background: #fee;
      color: #c33;
      border-bottom-left-radius: 4px;
    }

    .chat-input-area {
      padding: 16px 20px;
      border-top: 1px solid var(--border-color);
    }

    .chat-input-wrapper {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .chat-input {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .chat-input:focus {
      border-color: var(--primary);
    }

    .chat-send-btn {
      padding: 12px 20px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .chat-send-btn:hover {
      background: var(--primary-dark);
    }

    .chat-send-btn:disabled {
      background: var(--text-light);
      cursor: not-allowed;
    }

    .chat-turns {
      font-size: 12px;
      color: var(--text-light);
      text-align: center;
      margin-top: 8px;
    }

    @media (max-width: 480px) {
      .chat-window {
        width: 100%;
        height: 100%;
        max-height: 100%;
        border-radius: 0;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Intro Screen -->
    <div id="intro-screen" class="screen active">
      <div class="intro-card">
        <div class="intro-icon">🌿</div>
        <h1 class="intro-title">YYTI 压抑指数测试</h1>
        <p class="intro-subtitle">
          一款趣味心理测试，测量你在学业、职场、家庭、亲密关系、内心五个生活域中的压抑指数，生成15位模式串，匹配你的专属人格类型。
        </p>
        <div class="intro-features">
          <span class="intro-feature">30道题目</span>
          <span class="intro-feature">15个维度</span>
          <span class="intro-feature">25+种人格</span>
        </div>
        <button class="btn btn-primary" onclick="startTest()">
          开始测试
        </button>
      </div>
    </div>

    <!-- Test Screen -->
    <div id="test-screen" class="screen">
      <div class="test-header">
        <div class="progress-container">
          <div class="progress-bar">
            <div id="progress-fill" class="progress-fill" style="width: 0%"></div>
          </div>
        </div>
        <div id="progress-text" class="progress-text">已回答 0/30 题</div>
      </div>
      <div class="test-card">
        <div id="question-number" class="question-number">第 1 题</div>
        <div id="question-text" class="question-text"></div>
        <div id="options" class="options"></div>
        <div class="test-footer">
          <button id="next-btn" class="btn btn-primary" onclick="nextQuestion()" disabled>
            下一题
          </button>
        </div>
      </div>
    </div>

    <!-- Result Screen -->
    <div id="result-screen" class="screen">
      <div class="result-card">
        <div id="result-type-badge" class="result-type-badge"></div>
        <h2 id="result-type-name" class="result-type-name"></h2>
        <div id="result-match" class="result-match"></div>
        <div class="result-match-label">匹配度</div>
        <div id="result-intro" class="result-intro"></div>
        <div id="result-desc" class="result-desc"></div>
        <div id="pattern-display" class="pattern-display"></div>
      </div>
      <div class="result-footer">
        <button class="btn btn-secondary" onclick="showGuidanceScreen()">查看指引</button>
      </div>
    </div>

    <!-- Guidance Screen -->
    <div class="guidance-screen" id="guidance-screen">
      <div class="guidance-grid">
        <div class="guidance-icon" onclick="toggleGuidance('philosophy')">
          <span class="icon-emoji">📚</span>
          <span class="icon-label">哲学指引</span>
        </div>
        <div class="guidance-icon" onclick="toggleGuidance('psychology')">
          <span class="icon-emoji">🧠</span>
          <span class="icon-label">心理学指引</span>
        </div>
        <div class="guidance-icon" onclick="toggleGuidance('metaphysics')">
          <span class="icon-emoji">🔮</span>
          <span class="icon-label">玄学指引</span>
        </div>
      </div>
      <div class="guidance-content" id="guidance-philosophy"></div>
      <div class="guidance-content" id="guidance-psychology"></div>
      <div class="guidance-content" id="guidance-metaphysics"></div>
      <button class="guidance-btn" onclick="restartTest()">重新测试</button>
    </div>

    <!-- Chat Overlay -->
    <div class="chat-overlay" id="chat-overlay">
      <div class="chat-window">
        <div class="chat-header">
          <button class="chat-back-btn" onclick="closeChat()">← 返回</button>
          <span class="chat-title" id="chat-title">正在聆听...</span>
          <button class="chat-clear-btn" onclick="clearChat()">清空对话</button>
        </div>
        <div class="chat-identity" id="chat-identity">
          <div class="chat-identity-name" id="chat-identity-name"></div>
          <div class="chat-identity-desc" id="chat-identity-desc"></div>
        </div>
        <div class="chat-messages" id="chat-messages"></div>
        <div class="chat-input-area">
          <div class="chat-input-wrapper">
            <input type="text" class="chat-input" id="chat-input" placeholder="输入消息..." onkeypress="handleChatKeypress(event)">
            <button class="chat-send-btn" id="chat-send-btn" onclick="sendChatMessage()">发送</button>
          </div>
          <div class="chat-turns" id="chat-turns">剩余对话轮次：5/5</div>
        </div>
      </div>
    </div>

    <div class="footer">
      YYTI 压抑指数测试 · 纯前端单文件 · 零依赖
    </div>
  </div>

  <script>
    // ===== Global Data Variables =====
    let questions = [];
    let personalityTypes = [];
    let dimensionNames = {};
    let modelNames = {};
    let dimensionExplanations = {};

    // ===== State =====
    let currentQuestion = 0;
    let answers = [];
    let shuffledQuestions = [];
    let hiddenMatch = false;

    // ===== Utility Functions =====
    function shuffle(array) {
      const arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function showScreen(screenId) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(screenId + '-screen').classList.add('active');
    }

    function updateProgress() {
      const progress = (currentQuestion / 30) * 100;
      document.getElementById('progress-fill').style.width = progress + '%';
      document.getElementById('progress-text').textContent = `已回答 ${currentQuestion}/30 题`;
    }

    // ===== Core Algorithm =====
    function calculateResult() {
      // Group answers by dimension
      const dimensionScores = {};
      shuffledQuestions.forEach((q, idx) => {
        if (!dimensionScores[q.dimension]) {
          dimensionScores[q.dimension] = 0;
        }
        dimensionScores[q.dimension] += answers[idx];
      });

      // Convert to level (L/M/H)
      const dimensionLevels = {};
      Object.keys(dimensionScores).forEach(dim => {
        const score = dimensionScores[dim];
        if (score <= 3) dimensionLevels[dim] = 'L';
        else if (score <= 4) dimensionLevels[dim] = 'M';
        else dimensionLevels[dim] = 'H';
      });

      // Generate pattern string
      const dimOrder = ['A1', 'A2', 'A3', 'C1', 'C2', 'C3', 'F1', 'F2', 'F3', 'I1', 'I2', 'I3', 'IN1', 'IN2', 'IN3'];
      const pattern = dimOrder.map(d => dimensionLevels[d] || 'M').join('');

      // Calculate distances to each personality type
      let bestMatch = null;
      let bestDistance = Infinity;
      let bestSimilarity = 0;

      const patternArray = pattern.split('');

      // Filter personality types based on hiddenMatch
      let typesToMatch = personalityTypes.filter(t => !t.hidden);

      if (hiddenMatch) {
        // If hidden match triggered, prioritize hidden types
        const hiddenTypes = personalityTypes.filter(t => t.hidden);
        const normalTypes = personalityTypes.filter(t => !t.hidden);

        // Calculate best hidden type
        let bestHiddenType = null;
        let bestHiddenDistance = Infinity;

        hiddenTypes.forEach(type => {
          const typePattern = type.pattern.replace(/-/g, '');
          let distance = 0;
          for (let i = 0; i < 15; i++) {
            const p = patternArray[i] === 'H' ? 2 : patternArray[i] === 'M' ? 1 : 0;
            const t = typePattern[i] === 'H' ? 2 : typePattern[i] === 'M' ? 1 : 0;
            distance += Math.pow(p - t, 2);
          }
          distance = Math.sqrt(distance);

          if (distance < bestHiddenDistance) {
            bestHiddenDistance = distance;
            bestHiddenType = type;
          }
        });

        // If hidden type is significantly better, use it
        normalTypes.forEach(type => {
          const typePattern = type.pattern.replace(/-/g, '');
          let distance = 0;
          for (let i = 0; i < 15; i++) {
            const p = patternArray[i] === 'H' ? 2 : patternArray[i] === 'M' ? 1 : 0;
            const t = typePattern[i] === 'H' ? 2 : typePattern[i] === 'M' ? 1 : 0;
            distance += Math.pow(p - t, 2);
          }
          distance = Math.sqrt(distance);
          if (distance < bestDistance) {
            bestDistance = distance;
            bestMatch = type;
          }
        });

        if (bestHiddenType) {
          const hiddenSimilarity = (1 - bestHiddenDistance / Math.sqrt(27)) * 100;
          const normalSimilarity = (1 - bestDistance / Math.sqrt(27)) * 100;
          if (hiddenSimilarity > normalSimilarity - 5) {
            return {
              type: bestHiddenType,
              pattern: pattern,
              dimensionScores: dimensionScores,
              dimensionLevels: dimensionLevels,
              similarity: hiddenSimilarity,
              typeId: bestHiddenType.name
            };
          }
        }

        bestSimilarity = (1 - bestDistance / Math.sqrt(27)) * 100;
      } else {
        personalityTypes.forEach(type => {
          if (type.hidden) return; // Skip hidden types unless triggered

          const typePattern = type.pattern.replace(/-/g, '');
          let distance = 0;
          for (let i = 0; i < 15; i++) {
            const p = patternArray[i] === 'H' ? 2 : patternArray[i] === 'M' ? 1 : 0;
            const t = typePattern[i] === 'H' ? 2 : typePattern[i] === 'M' ? 1 : 0;
            distance += Math.pow(p - t, 2);
          }
          distance = Math.sqrt(distance);

          if (distance < bestDistance) {
            bestDistance = distance;
            bestMatch = type;
          }
        });
        bestSimilarity = (1 - bestDistance / Math.sqrt(27)) * 100;
      }

      // Fallback personality if similarity < 60%
      if (bestSimilarity < 60) {
        return {
          type: {
            name: '迷途者',
            group: '兜底',
            pattern: 'MMMMM-MMMMM-MMMMM-MMMMM-MMMMM',
            intro: '你是一个独特的存在，不属于任何预设类型。',
            desc: '你的性格特质比较均衡，没有特别突出的压抑点。你可能在不同情境下展现出不同的特质组合。'
          },
          pattern: pattern,
          dimensionScores: dimensionScores,
          dimensionLevels: dimensionLevels,
          similarity: bestSimilarity,
          typeId: '迷途者'
        };
      }

      return {
        type: bestMatch,
        pattern: pattern,
        dimensionScores: dimensionScores,
        dimensionLevels: dimensionLevels,
        similarity: bestSimilarity,
        typeId: bestMatch.name
      };
    }

    function renderResult(result) {
      window.currentTypeId = result.typeId;
      document.getElementById('result-type-badge').textContent = result.type.group;
      document.getElementById('result-type-name').textContent = result.type.name;
      document.getElementById('result-match').textContent = Math.round(result.similarity) + '%';
      document.getElementById('result-intro').textContent = result.type.intro;
      document.getElementById('result-desc').textContent = result.type.desc;

      // Format pattern with dashes
      const formattedPattern = result.pattern.replace(/(.{3})/g, '$1-').replace(/-$/, '');
      document.getElementById('pattern-display').textContent = '模式: ' + formattedPattern;
      showScreen('result');
    }

    function renderRecommendations(typeId) {
      const recs = window.recommendations;
      if (!recs || !recs[typeId]) return;

      const r = recs[typeId];

      // Remove existing recommendation section if present
      const existing = document.getElementById('recommendation-section');
      if (existing) existing.remove();

      // Create recommendation section HTML
      const recSection = document.createElement('div');
      recSection.id = 'recommendation-section';
      recSection.className = 'recommendation-section';

      recSection.innerHTML = `
        <div class="rec-column">
          <h3 class="rec-column-title">哲学指引</h3>
          <div class="rec-list">
            ${r.philosophy.map(p => `
              <div class="rec-item">
                <div class="rec-book">${p.book}</div>
                <div class="rec-reason">${p.reason}</div>
              </div>
            `).join('')}
          </div>
        </div>
        <div class="rec-column">
          <h3 class="rec-column-title">玄学指引</h3>
          <div class="rec-list">
            ${r.metaphysics.map(m => `
              <div class="rec-item">
                <div class="rec-tool">${m.tool}</div>
                <div class="rec-desc">${m.desc}</div>
              </div>
            `).join('')}
          </div>
        </div>
      `;

      // Insert between result-card and result-footer
      const resultCard = document.querySelector('.result-card');
      const resultFooter = document.querySelector('.result-footer');
      resultCard.parentNode.insertBefore(recSection, resultFooter);
    }

    // ===== Event Handlers =====
    async function startTest() {
      currentQuestion = 0;
      answers = [];
      hiddenMatch = false;

      // Show loading state
      document.getElementById('question-text').textContent = '正在加载题目数据...';
      document.getElementById('options').innerHTML = '';

      try {
        const [questionsRes, personalitiesRes, dimensionsRes, recsRes] = await Promise.all([
          fetch('data/questions.json'),
          fetch('data/personalities.json'),
          fetch('data/dimensions.json'),
          fetch('data/recommendations.json')
        ]);

        const [questionsData, personalitiesData, dimensionsData, recsData] = await Promise.all([
          questionsRes.json(),
          personalitiesRes.json(),
          dimensionsRes.json(),
          recsRes.json()
        ]);

        // Assign loaded data to global variables
        window.questions = questionsData;
        window.personalityTypes = personalitiesData;
        window.dimensionNames = dimensionsData.dimensionNames;
        window.modelNames = dimensionsData.modelNames;
        window.dimensionExplanations = dimensionsData.dimensionExplanations;

        // Also assign to local scope for compatibility
        questions = window.questions;
        personalityTypes = window.personalityTypes;
        dimensionNames = window.dimensionNames;
        modelNames = window.modelNames;
        dimensionExplanations = window.dimensionExplanations;

        window.recommendations = recsData;

        shuffledQuestions = shuffle(questions);
        showScreen('test');
        renderQuestion();
      } catch (err) {
        console.error('Failed to load data:', err);
        document.getElementById('question-text').textContent = '数据加载失败，请刷新重试';
      }
    }

    function renderQuestion() {
      const q = shuffledQuestions[currentQuestion];
      document.getElementById('question-number').textContent = `第 ${currentQuestion + 1} 题`;
      document.getElementById('question-text').textContent = q.text;

      const optionsContainer = document.getElementById('options');
      optionsContainer.innerHTML = '';

      q.options.forEach((opt, idx) => {
        const btn = document.createElement('button');
        btn.className = 'option' + (answers[currentQuestion] === opt.score ? ' selected' : '');
        btn.innerHTML = `<span class="option-marker">${String.fromCharCode(65 + idx)}</span>${opt.text}`;
        btn.onclick = () => selectOption(opt.score, btn);
        optionsContainer.appendChild(btn);
      });

      updateProgress();

      const nextBtn = document.getElementById('next-btn');
      nextBtn.disabled = answers[currentQuestion] === undefined;
      nextBtn.textContent = currentQuestion === 5 ? '查看结果' : '下一题';
    }

    function selectOption(score, btn) {
      answers[currentQuestion] = score;

      // Check for hidden trigger (Q15 = "冥想或静坐")
      const q = shuffledQuestions[currentQuestion];
      if (q.id === 15 && score === 3) {
        hiddenMatch = true;
      }

      document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
      btn.classList.add('selected');
      document.getElementById('next-btn').disabled = false;
    }

    function nextQuestion() {
      if (currentQuestion < 5) {
        currentQuestion++;
        renderQuestion();
      } else {
        const result = calculateResult();
        renderResult(result);
      }
    }

    function restartTest() {
      document.querySelector('.result-card').style.display = '';
      document.querySelector('.result-footer').style.display = '';
      const guidanceScreen = document.getElementById('guidance-screen');
      if (guidanceScreen) guidanceScreen.classList.remove('active');
      showScreen('intro');
    }

    function showGuidanceScreen() {
      renderGuidancePanel(window.currentTypeId);
      document.getElementById('result-screen').classList.remove('active');
      document.getElementById('guidance-screen').classList.add('active');
    }

    function renderGuidancePanel(typeId) {
      const recs = window.recommendations;
      if (!recs || !recs[typeId]) return;

      const r = recs[typeId];

      // Clear all guidance content panels
      document.getElementById('guidance-philosophy').innerHTML = '';
      document.getElementById('guidance-psychology').innerHTML = '';
      document.getElementById('guidance-metaphysics').innerHTML = '';

      // Philosophy panel
      const philContent = document.getElementById('guidance-philosophy');
      philContent.innerHTML = `
        <h3>哲学指引</h3>
        ${r.philosophy.map(p => `
          <div class="rec-item">
            <div class="rec-book">${p.book}</div>
            <div class="rec-reason">${p.reason}</div>
            <button class="chat-btn" onclick="openChat('philosophy', '${p.book}', this)" title="与作者对话">💬</button>
          </div>
        `).join('')}
      `;

      // Psychology panel
      const psyContent = document.getElementById('guidance-psychology');
      psyContent.innerHTML = `
        <h3>心理学指引</h3>
        ${(r.psychology || []).map(p => `
          <div class="rec-item">
            <div class="rec-book">${p.book}</div>
            <div class="rec-reason">${p.reason}</div>
            <button class="chat-btn" onclick="openChat('psychology', '${p.book}', this)" title="与作者对话">💬</button>
          </div>
        `).join('')}
      `;

      // Metaphysics panel
      const metContent = document.getElementById('guidance-metaphysics');
      metContent.innerHTML = `
        <h3>玄学指引</h3>
        ${r.metaphysics.map(m => `
          <div class="rec-item">
            <div class="rec-tool">${m.tool}</div>
            <div class="rec-desc">${m.desc}</div>
            <button class="chat-btn" onclick="openChat('metaphysics', '${m.tool}', this)" title="与玄学大师对话">💬</button>
          </div>
        `).join('')}
      `;
    }

    function toggleGuidance(type) {
      const panel = document.getElementById('guidance-' + type);
      panel.classList.toggle('active');
    }

    // ===== Chat Functions =====
    let chatTurns = 0;
    let chatMessages = [];
    let currentSystemPrompt = '';
    let currentChatType = null;
    let currentItemName = '';
    const MAX_CHAT_TURNS = 5;

    // API URL - 部署 Worker 后填入 Worker 地址
    const CHAT_API_URL = 'http://localhost:8788';
    const MODEL_NAME = 'qwen/qwen3-coder:free';
    const API_KEY = ''; // 留空则使用 OpenRouter 默认免费额度，或填入你的 sk-or-v1-xxx

    function extractItemName(type, bookOrTool) {
      if (type === 'metaphysics') return bookOrTool;
      const match = bookOrTool.match(/^(.+?)《/);
      return match ? match[1] : bookOrTool;
    }

    function buildSystemPrompt(type, itemName) {
      const basePrompts = {
        philosophy: `你扮演 ${itemName}，一位历史上的真实哲学家（代表作品见推荐书籍）。
你以第一人称"我"来回答问题。
当用户提问时，你结合你的著作、思想来给出建议。
保持角色一致性，即使面对与你的思想不符的问题，也要以你的视角来回应。
回答使用文言文与白话文结合的风格，体现古典气质。
重要：当用户描述自己的困扰时，你首先要表达理解和同情。`,

        psychology: `你是 ${itemName}，一位心理学大师。
你以第一人称"我"来回答问题，结合你的心理学理论来分析和建议。
你的回答应该体现你的专业背景和理论体系。
当用户描述困扰时，先共情，再从你的专业角度给出洞见。
保持温和但深刻的咨询风格。`,

        metaphysics: `你是一位玄学大师，精通 ${itemName}。
你以第一人称"我"来进行对话。
当用户描述困扰时，你需要用玄学的方式（如起卦、看相、八字等）来解读。
重要：每次回答的开头，你需要进行随机起卦或占卜，然后用卦象来解读用户的问题。
起卦示例："待我起一卦...艮上坤下，地山谦卦。谦者，地中有山之象..."
起卦必须随机生成，不可重复。
你的解读应该神秘但不迷信，玄妙但有智慧。`
      };
      return basePrompts[type];
    }

    function getIdentityDescription(type, itemName) {
      const descriptions = {
        philosophy: {
          '塞内卡': '斯多葛学派哲学家（公元前4年-65年）',
          '尼采': '德国哲学家（1844-1900）',
          '马可·奥勒留': '罗马皇帝、斯多葛哲学家',
          '爱比克泰德': '斯多葛学派哲学家（55-135年）',
          '孔子': '儒家学派创始人（公元前551年-前479年）',
          '王阳明': '心学大师（1472-1529年）',
          '弗洛姆': '精神分析学家（1900-1980）',
          '柏拉图': '古希腊哲学家（公元前427年-前347年）',
          '佛教': '佛教经典',
          '一行禅师': '越南禅宗大师（1926-2022）'
        },
        psychology: {
          '阿德勒': '个体心理学创始人（1870-1937）',
          '卡伦·霍妮': '精神分析学家（1885-1952）'
        },
        metaphysics: {}
      };

      const typeDescs = descriptions[type] || {};
      return typeDescs[itemName] || (type === 'metaphysics' ? `${itemName}领域大师` : '');
    }

    function openChat(type, bookOrTool, btn) {
      currentChatType = type;
      currentItemName = extractItemName(type, bookOrTool);
      currentSystemPrompt = buildSystemPrompt(type, currentItemName);
      chatTurns = 0;
      chatMessages = [];

      // Update UI
      document.getElementById('chat-title').textContent = `${currentItemName}正在聆听...`;
      document.getElementById('chat-identity-name').textContent = currentItemName;
      document.getElementById('chat-identity-desc').textContent = getIdentityDescription(type, currentItemName);
      document.getElementById('chat-messages').innerHTML = '';
      document.getElementById('chat-input').value = '';
      document.getElementById('chat-turns').textContent = `剩余对话轮次：${MAX_CHAT_TURNS}/${MAX_CHAT_TURNS}`;
      document.getElementById('chat-send-btn').disabled = false;

      // Show overlay
      document.getElementById('chat-overlay').classList.add('active');
      document.getElementById('chat-input').focus();
    }

    function closeChat() {
      document.getElementById('chat-overlay').classList.remove('active');
      chatTurns = 0;
      chatMessages = [];
      currentChatType = null;
      currentItemName = '';
      currentSystemPrompt = '';
    }

    function clearChat() {
      chatMessages = [];
      chatTurns = 0;
      document.getElementById('chat-messages').innerHTML = '';
      document.getElementById('chat-turns').textContent = `剩余对话轮次：${MAX_CHAT_TURNS}/${MAX_CHAT_TURNS}`;
      document.getElementById('chat-send-btn').disabled = false;
    }

    function addChatMessage(role, content) {
      const messagesDiv = document.getElementById('chat-messages');
      const msgDiv = document.createElement('div');
      msgDiv.className = `chat-message ${role}`;
      msgDiv.textContent = content;
      messagesDiv.appendChild(msgDiv);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function handleChatKeypress(event) {
      if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        sendChatMessage();
      }
    }

    async function sendChatMessage() {
      const input = document.getElementById('chat-input');
      const content = input.value.trim();
      if (!content) return;

      if (chatTurns >= MAX_CHAT_TURNS) {
        addChatMessage('error', '对话轮次已用完，请返回重新选择');
        return;
      }

      // Disable send button during request
      document.getElementById('chat-send-btn').disabled = true;

      // Add user message
      addChatMessage('user', content);
      chatMessages.push({ role: 'user', content });
      input.value = '';

      // Update turns
      chatTurns++;
      document.getElementById('chat-turns').textContent = `剩余对话轮次：${MAX_CHAT_TURNS - chatTurns}/${MAX_CHAT_TURNS}`;

      // Add loading indicator
      const loadingDiv = document.createElement('div');
      loadingDiv.className = 'chat-message ai loading';
      loadingDiv.textContent = '思考中...';
      document.getElementById('chat-messages').appendChild(loadingDiv);

      try {
        // Call API (non-streaming, receives complete response)
        const response = await fetch(CHAT_API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            messages: chatMessages,
            systemPrompt: currentSystemPrompt,
            turns: chatTurns
          })
        });

        // Remove loading indicator
        loadingDiv.remove();

        if (!response.ok) {
          const error = await response.json();
          throw new Error(error.error || '请求失败');
        }

        // Parse JSON response (complete response, no streaming)
        const data = await response.json();

        // Display complete response at once
        const aiResponse = data.content || '';

        const aiMsgDiv = document.createElement('div');
        aiMsgDiv.className = 'chat-message ai';
        aiMsgDiv.textContent = aiResponse;
        document.getElementById('chat-messages').appendChild(aiMsgDiv);

        chatMessages.push({ role: 'assistant', content: aiResponse });
        document.getElementById('chat-messages').scrollTop = document.getElementById('chat-messages').scrollHeight;

      } catch (error) {
        addChatMessage('error', `错误：${error.message}`);
      } finally {
        document.getElementById('chat-send-btn').disabled = false;
        document.getElementById('chat-input').focus();
      }
    }
  </script>
