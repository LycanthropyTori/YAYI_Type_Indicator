<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YYTI 压抑指数测试</title>
  <style>
    :root {
      --primary: #6c8d71;
      --primary-dark: #4d6a53;
      --primary-light: #8dab98;
      --bg-gradient: linear-gradient(135deg, #f5f7f5 0%, #e8ede8 100%);
      --card-bg: #ffffff;
      --text-primary: #2d3a2e;
      --text-secondary: #5a6b5c;
      --text-light: #8a9a8c;
      --border-color: #d4ddd5;
      --radius: 22px;
      --radius-sm: 12px;
      --shadow: 0 8px 32px rgba(108, 141, 113, 0.12);
      --shadow-sm: 0 4px 16px rgba(108, 141, 113, 0.08);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg-gradient);
      min-height: 100vh;
      color: var(--text-primary);
      line-height: 1.6;
    }

    .container {
      max-width: 680px;
      margin: 0 auto;
      padding: 20px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Screens */
    .screen {
      display: none;
      flex: 1;
      flex-direction: column;
      justify-content: center;
      animation: fadeIn 0.4s ease;
    }

    .screen.active {
      display: flex;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }

    /* Intro Screen */
    .intro-card {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 48px 40px;
      box-shadow: var(--shadow);
      text-align: center;
      animation: slideUp 0.6s ease;
    }

    .intro-icon {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      border-radius: 50%;
      margin: 0 auto 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      animation: float 3s ease-in-out infinite;
    }

    .intro-title {
      font-size: 28px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 12px;
      background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .intro-subtitle {
      font-size: 16px;
      color: var(--text-secondary);
      margin-bottom: 32px;
      line-height: 1.8;
    }

    .intro-features {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-bottom: 32px;
      flex-wrap: wrap;
    }

    .intro-feature {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
      color: var(--text-secondary);
      padding: 8px 16px;
      background: #f8faf8;
      border-radius: 20px;
      transition: all 0.3s ease;
    }

    .intro-feature:hover {
      background: rgba(108, 141, 113, 0.1);
      transform: translateY(-2px);
    }

    .intro-feature::before {
      content: "";
      width: 6px;
      height: 6px;
      background: var(--primary);
      border-radius: 50%;
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 32px;
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: white;
      box-shadow: 0 4px 16px rgba(108, 141, 113, 0.3);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(108, 141, 113, 0.4);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-secondary {
      background: var(--card-bg);
      color: var(--primary);
      border: 2px solid var(--primary);
    }

    .btn-secondary:hover {
      background: var(--primary);
      color: white;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none !important;
    }

    /* Test Screen */
    .test-header {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 20px 24px;
      margin-bottom: 20px;
      box-shadow: var(--shadow-sm);
    }

    .progress-container {
      margin-bottom: 12px;
    }

    .progress-bar {
      height: 8px;
      background: var(--border-color);
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary) 0%, var(--primary-light) 100%);
      border-radius: 4px;
      transition: width 0.4s ease;
    }

    .progress-text {
      font-size: 14px;
      color: var(--text-secondary);
      text-align: center;
      margin-top: 8px;
    }

    .test-card {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 32px;
      box-shadow: var(--shadow);
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .question-number {
      font-size: 13px;
      color: var(--primary);
      font-weight: 600;
      margin-bottom: 8px;
    }

    .question-text {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 28px;
      line-height: 1.7;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 12px;
      flex: 1;
    }

    .option {
      padding: 16px 20px;
      background: #f8faf8;
      border: 2px solid var(--border-color);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.25s ease;
      font-size: 15px;
      color: var(--text-primary);
      text-align: left;
    }

    .option:hover {
      border-color: var(--primary);
      background: #f0f5f0;
    }

    .option.selected {
      border-color: var(--primary);
      background: linear-gradient(135deg, rgba(108, 141, 113, 0.1) 0%, rgba(108, 141, 113, 0.05) 100%);
    }

    .option-marker {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: var(--border-color);
      color: var(--text-secondary);
      font-size: 13px;
      font-weight: 600;
      margin-right: 12px;
      transition: all 0.25s ease;
    }

    .option.selected .option-marker {
      background: var(--primary);
      color: white;
    }

    .test-footer {
      margin-top: 24px;
      display: flex;
      justify-content: center;
    }

    /* Result Screen */
    .result-card {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 32px;
      box-shadow: var(--shadow);
      text-align: center;
      margin-bottom: 20px;
    }

    .result-type-badge {
      display: inline-block;
      padding: 6px 16px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: white;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 16px;
    }

    .result-type-name {
      font-size: 32px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .result-match {
      font-size: 48px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 4px;
    }

    .result-match-label {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 24px;
    }

    .result-intro {
      font-size: 16px;
      color: var(--text-secondary);
      line-height: 1.8;
      padding: 20px;
      background: #f8faf8;
      border-radius: var(--radius-sm);
      margin-bottom: 16px;
    }

    .result-desc {
      font-size: 15px;
      color: var(--text-light);
      line-height: 1.7;
    }

    /* Dimensions Table */
    .dimensions-card {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: var(--shadow);
      margin-bottom: 20px;
    }

    .dimensions-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 16px;
      text-align: center;
    }

    .dimensions-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    .dimensions-table th {
      background: #f5f7f5;
      padding: 10px 8px;
      text-align: left;
      font-weight: 600;
      color: var(--text-secondary);
      border-bottom: 2px solid var(--border-color);
    }

    .dimensions-table th:first-child {
      border-radius: 8px 0 0 0;
    }

    .dimensions-table th:last-child {
      border-radius: 0 8px 0 0;
    }

    .dimensions-table td {
      padding: 10px 8px;
      border-bottom: 1px solid var(--border-color);
      color: var(--text-primary);
    }

    .dimensions-table tr:last-child td {
      border-bottom: none;
    }

    .dimension-level {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
    }

    .level-H {
      background: rgba(108, 141, 113, 0.15);
      color: var(--primary-dark);
    }

    .level-M {
      background: rgba(180, 160, 100, 0.15);
      color: #8a7a50;
    }

    .level-L {
      background: rgba(180, 100, 100, 0.15);
      color: #8a5050;
    }

    .result-footer {
      display: flex;
      gap: 12px;
      justify-content: center;
    }

    /* Pattern Display */
    .pattern-display {
      background: #f5f7f5;
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      margin-top: 16px;
      font-family: "SF Mono", "Consolas", monospace;
      font-size: 12px;
      color: var(--text-secondary);
      letter-spacing: 1px;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .container {
        padding: 16px;
      }

      .intro-card {
        padding: 32px 24px;
      }

      .intro-title {
        font-size: 24px;
      }

      .intro-subtitle {
        font-size: 15px;
      }

      .intro-features {
        flex-direction: column;
        gap: 12px;
      }

      .test-card {
        padding: 24px;
      }

      .question-text {
        font-size: 16px;
      }

      .result-type-name {
        font-size: 26px;
      }

      .result-match {
        font-size: 40px;
      }

      .dimensions-card {
        padding: 16px;
      }

      .dimensions-table {
        font-size: 12px;
      }

      .dimensions-table th,
      .dimensions-table td {
        padding: 8px 6px;
      }
    }

    /* Footer */
    .footer {
      text-align: center;
      padding: 20px;
      color: var(--text-light);
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Intro Screen -->
    <div id="intro-screen" class="screen active">
      <div class="intro-card">
        <div class="intro-icon">🌿</div>
        <h1 class="intro-title">YYTI 压抑指数测试</h1>
        <p class="intro-subtitle">
          一款趣味心理测试，测量你在学业、职场、家庭、亲密关系、内心五个生活域中的压抑指数，生成15位模式串，匹配你的专属人格类型。
        </p>
        <div class="intro-features">
          <span class="intro-feature">30道题目</span>
          <span class="intro-feature">15个维度</span>
          <span class="intro-feature">25+种人格</span>
        </div>
        <button class="btn btn-primary" onclick="startTest()">
          开始测试
        </button>
      </div>
    </div>

    <!-- Test Screen -->
    <div id="test-screen" class="screen">
      <div class="test-header">
        <div class="progress-container">
          <div class="progress-bar">
            <div id="progress-fill" class="progress-fill" style="width: 0%"></div>
          </div>
        </div>
        <div id="progress-text" class="progress-text">已回答 0/30 题</div>
      </div>
      <div class="test-card">
        <div id="question-number" class="question-number">第 1 题</div>
        <div id="question-text" class="question-text"></div>
        <div id="options" class="options"></div>
        <div class="test-footer">
          <button id="next-btn" class="btn btn-primary" onclick="nextQuestion()" disabled>
            下一题
          </button>
        </div>
      </div>
    </div>

    <!-- Result Screen -->
    <div id="result-screen" class="screen">
      <div class="result-card">
        <div id="result-type-badge" class="result-type-badge"></div>
        <h2 id="result-type-name" class="result-type-name"></h2>
        <div id="result-match" class="result-match"></div>
        <div class="result-match-label">匹配度</div>
        <div id="result-intro" class="result-intro"></div>
        <div id="result-desc" class="result-desc"></div>
        <div id="pattern-display" class="pattern-display"></div>
      </div>
      <div class="dimensions-card">
        <h3 class="dimensions-title">15维度解析</h3>
        <table class="dimensions-table">
          <thead>
            <tr>
              <th>维度</th>
              <th>名称</th>
              <th>原始分</th>
              <th>等级</th>
              <th>解读</th>
            </tr>
          </thead>
          <tbody id="dimensions-body">
          </tbody>
        </table>
      </div>
      <div class="result-footer">
        <button class="btn btn-secondary" onclick="restartTest()">重新测试</button>
      </div>
    </div>

    <div class="footer">
      YYTI 压抑指数测试 · 纯前端单文件 · 零依赖
    </div>
  </div>

  <script>
    // ===== Questions Data =====
    const questions = [
      // Academic - A1学习动机 (Q1, Q16)
      {
        id: 1,
        model: 'Academic',
        dimension: 'A1',
        text: '你学习的动力主要来自？',

    // ===== State =====
    let currentQuestion = 0;
    let answers = [];
    let shuffledQuestions = [];
    let hiddenMatch = false;

    // ===== Utility Functions =====
    function shuffle(array) {
      const arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function showScreen(screenId) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(screenId + '-screen').classList.add('active');
    }

    function updateProgress() {
      const progress = (currentQuestion / 30) * 100;
      document.getElementById('progress-fill').style.width = progress + '%';
      document.getElementById('progress-text').textContent = `已回答 ${currentQuestion}/30 题`;
    }

    // ===== Core Algorithm =====
    function calculateResult() {
      // Group answers by dimension
      const dimensionScores = {};
      shuffledQuestions.forEach((q, idx) => {
        if (!dimensionScores[q.dimension]) {
          dimensionScores[q.dimension] = 0;
        }
        dimensionScores[q.dimension] += answers[idx];
      });

      // Convert to level (L/M/H)
      const dimensionLevels = {};
      Object.keys(dimensionScores).forEach(dim => {
        const score = dimensionScores[dim];
        if (score <= 3) dimensionLevels[dim] = 'L';
        else if (score <= 4) dimensionLevels[dim] = 'M';
        else dimensionLevels[dim] = 'H';
      });

      // Generate pattern string
      const dimOrder = ['A1', 'A2', 'A3', 'C1', 'C2', 'C3', 'F1', 'F2', 'F3', 'I1', 'I2', 'I3', 'IN1', 'IN2', 'IN3'];
      const pattern = dimOrder.map(d => dimensionLevels[d] || 'M').join('');

      // Calculate distances to each personality type
      let bestMatch = null;
      let bestDistance = Infinity;
      let bestSimilarity = 0;

      const patternArray = pattern.split('');

      // Filter personality types based on hiddenMatch
      let typesToMatch = personalityTypes.filter(t => !t.hidden);

      if (hiddenMatch) {
        // If hidden match triggered, prioritize hidden types
        const hiddenTypes = personalityTypes.filter(t => t.hidden);
        const normalTypes = personalityTypes.filter(t => !t.hidden);

        // Calculate best hidden type
        let bestHiddenType = null;
        let bestHiddenDistance = Infinity;

        hiddenTypes.forEach(type => {
          const typePattern = type.pattern.replace(/-/g, '');
          let distance = 0;
          for (let i = 0; i < 15; i++) {
            const p = patternArray[i] === 'H' ? 2 : patternArray[i] === 'M' ? 1 : 0;
            const t = typePattern[i] === 'H' ? 2 : typePattern[i] === 'M' ? 1 : 0;
            distance += Math.pow(p - t, 2);
          }
          distance = Math.sqrt(distance);

          if (distance < bestHiddenDistance) {
            bestHiddenDistance = distance;
            bestHiddenType = type;
          }
        });

        // If hidden type is significantly better, use it
        normalTypes.forEach(type => {
          const typePattern = type.pattern.replace(/-/g, '');
          let distance = 0;
          for (let i = 0; i < 15; i++) {
            const p = patternArray[i] === 'H' ? 2 : patternArray[i] === 'M' ? 1 : 0;
            const t = typePattern[i] === 'H' ? 2 : typePattern[i] === 'M' ? 1 : 0;
            distance += Math.pow(p - t, 2);
          }
          distance = Math.sqrt(distance);
          if (distance < bestDistance) {
            bestDistance = distance;
            bestMatch = type;
          }
        });

        if (bestHiddenType) {
          const hiddenSimilarity = (1 - bestHiddenDistance / Math.sqrt(27)) * 100;
          const normalSimilarity = (1 - bestDistance / Math.sqrt(27)) * 100;
          if (hiddenSimilarity > normalSimilarity - 5) {
            return {
              type: bestHiddenType,
              pattern: pattern,
              dimensionScores: dimensionScores,
              dimensionLevels: dimensionLevels,
              similarity: hiddenSimilarity
            };
          }
        }

        bestSimilarity = (1 - bestDistance / Math.sqrt(27)) * 100;
      } else {
        personalityTypes.forEach(type => {
          if (type.hidden) return; // Skip hidden types unless triggered

          const typePattern = type.pattern.replace(/-/g, '');
          let distance = 0;
          for (let i = 0; i < 15; i++) {
            const p = patternArray[i] === 'H' ? 2 : patternArray[i] === 'M' ? 1 : 0;
            const t = typePattern[i] === 'H' ? 2 : typePattern[i] === 'M' ? 1 : 0;
            distance += Math.pow(p - t, 2);
          }
          distance = Math.sqrt(distance);

          if (distance < bestDistance) {
            bestDistance = distance;
            bestMatch = type;
          }
        });
        bestSimilarity = (1 - bestDistance / Math.sqrt(27)) * 100;
      }

      // Fallback personality if similarity < 60%
      if (bestSimilarity < 60) {
        return {
          type: {
            name: '迷途者',
            group: '兜底',
            pattern: 'MMMMM-MMMMM-MMMMM-MMMMM-MMMMM',
            intro: '你是一个独特的存在，不属于任何预设类型。',
            desc: '你的性格特质比较均衡，没有特别突出的压抑点。你可能在不同情境下展现出不同的特质组合。'
          },
          pattern: pattern,
          dimensionScores: dimensionScores,
          dimensionLevels: dimensionLevels,
          similarity: bestSimilarity
        };
      }

      return {
        type: bestMatch,
        pattern: pattern,
        dimensionScores: dimensionScores,
        dimensionLevels: dimensionLevels,
        similarity: bestSimilarity
      };
    }

    function renderResult(result) {
      document.getElementById('result-type-badge').textContent = result.type.group;
      document.getElementById('result-type-name').textContent = result.type.name;
      document.getElementById('result-match').textContent = Math.round(result.similarity) + '%';
      document.getElementById('result-intro').textContent = result.type.intro;
      document.getElementById('result-desc').textContent = result.type.desc;

      // Format pattern with dashes
      const formattedPattern = result.pattern.replace(/(.{3})/g, '$1-').replace(/-$/, '');
      document.getElementById('pattern-display').textContent = '模式: ' + formattedPattern;

      // Render dimensions table
      const dimOrder = ['A1', 'A2', 'A3', 'C1', 'C2', 'C3', 'F1', 'F2', 'F3', 'I1', 'I2', 'I3', 'IN1', 'IN2', 'IN3'];
      const tbody = document.getElementById('dimensions-body');
      tbody.innerHTML = '';

      dimOrder.forEach(dim => {
        const score = result.dimensionScores[dim] || 0;
        const level = result.dimensionLevels[dim] || 'M';
        const explanation = dimensionExplanations[level][dim];

        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${dim}</td>
          <td>${dimensionNames[dim]}</td>
          <td>${score}</td>
          <td><span class="dimension-level level-${level}">${level}</span></td>
          <td>${explanation}</td>
        `;
        tbody.appendChild(tr);
      });
    }

    // ===== Event Handlers =====
    function startTest() {
      currentQuestion = 0;
      answers = [];
      hiddenMatch = false;
      shuffledQuestions = shuffle(questions);
      showScreen('test');
      renderQuestion();
    }

    function renderQuestion() {
      const q = shuffledQuestions[currentQuestion];
      document.getElementById('question-number').textContent = `第 ${currentQuestion + 1} 题`;
      document.getElementById('question-text').textContent = q.text;

      const optionsContainer = document.getElementById('options');
      optionsContainer.innerHTML = '';

      q.options.forEach((opt, idx) => {
        const btn = document.createElement('button');
        btn.className = 'option' + (answers[currentQuestion] === opt.score ? ' selected' : '');
        btn.innerHTML = `<span class="option-marker">${String.fromCharCode(65 + idx)}</span>${opt.text}`;
        btn.onclick = () => selectOption(opt.score, btn);
        optionsContainer.appendChild(btn);
      });

      updateProgress();

      const nextBtn = document.getElementById('next-btn');
      nextBtn.disabled = answers[currentQuestion] === undefined;
      nextBtn.textContent = currentQuestion === 29 ? '查看结果' : '下一题';
    }

    function selectOption(score, btn) {
      answers[currentQuestion] = score;

      // Check for hidden trigger (Q15 = "找个安静的角落独自喝点小酒")
      const q = shuffledQuestions[currentQuestion];
      if (q.id === 15 && score === 3) {
        hiddenMatch = true;
      }

      document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
      btn.classList.add('selected');
      document.getElementById('next-btn').disabled = false;
    }

    function nextQuestion() {
      if (currentQuestion < 29) {
        currentQuestion++;
        renderQuestion();
      } else {
        const result = calculateResult();
        renderResult(result);
        showScreen('result');
      }
    }

    function restartTest() {
      showScreen('intro');
    }
